<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fde047"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
  </defs>
  <!-- body -->
  <rect x="6" y="10" width="20" height="20" rx="10" fill="url(#bg)"/>
  <!-- raised arms (Y shape) -->
  <path d="M8 14 L 3 5"  stroke="#facc15" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M24 14 L 29 5" stroke="#facc15" stroke-width="3.2" stroke-linecap="round"/>
  <circle cx="3"  cy="5" r="2.2" fill="#facc15"/>
  <circle cx="29" cy="5" r="2.2" fill="#facc15"/>
  <!-- closed happy eyes ^ ^ -->
  <path d="M11 18 Q13 16 15 18" stroke="#1f2937" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <path d="M17 18 Q19 16 21 18" stroke="#1f2937" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- big smile -->
  <path d="M12 22 Q16 26 20 22" stroke="#1f2937" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- sparkle confetti -->
  <circle cx="2"  cy="14" r="0.9" fill="#fbbf24"/>
  <circle cx="30" cy="14" r="0.9" fill="#fbbf24"/>
  <circle cx="6"  cy="3"  r="0.7" fill="#fbbf24"/>
  <circle cx="26" cy="3"  r="0.7" fill="#fbbf24"/>
</svg>
