<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- antennae (slate-800) -->
  <rect x="5" y="2" width="1" height="2" fill="#1f2937"/>
  <rect x="10" y="2" width="1" height="2" fill="#1f2937"/>
  <rect x="4" y="2" width="1" height="1" fill="#1f2937"/>
  <rect x="11" y="2" width="1" height="1" fill="#1f2937"/>
  <!-- wings (sky-200 with opacity) -->
  <rect x="1" y="6" width="2" height="3" fill="#bae6fd" opacity="0.85"/>
  <rect x="13" y="6" width="2" height="3" fill="#bae6fd" opacity="0.85"/>
  <!-- body base (yellow-400) -->
  <rect x="3" y="4" width="10" height="10" fill="#facc15"/>
  <!-- stripes (charcoal) -->
  <rect x="3" y="7" width="10" height="1" fill="#1f2937"/>
  <rect x="3" y="11" width="10" height="1" fill="#1f2937"/>
  <!-- eyes -->
  <rect x="5" y="5" width="1" height="2" fill="#1f2937"/>
  <rect x="10" y="5" width="1" height="2" fill="#1f2937"/>
  <!-- smile -->
  <rect x="7" y="9" width="2" height="1" fill="#1f2937"/>
  <!-- blush (orange-400) -->
  <rect x="4" y="9" width="1" height="1" fill="#fb923c"/>
  <rect x="11" y="9" width="1" height="1" fill="#fb923c"/>
</svg>
