<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- top bumps (sky-300) -->
  <rect x="4" y="5" width="3" height="2" fill="#7dd3fc"/>
  <rect x="7" y="4" width="3" height="2" fill="#7dd3fc"/>
  <rect x="9" y="6" width="3" height="2" fill="#7dd3fc"/>
  <!-- main body -->
  <rect x="2" y="7" width="12" height="4" fill="#7dd3fc"/>
  <!-- bottom -->
  <rect x="3" y="11" width="10" height="1" fill="#7dd3fc"/>
  <!-- eyes (slate-700 — contrasts on sky-300) -->
  <rect x="5" y="8" width="1" height="2" fill="#334155"/>
  <rect x="10" y="8" width="1" height="2" fill="#334155"/>
  <!-- blush (pink-300) -->
  <rect x="4" y="10" width="1" height="1" fill="#f9a8d4"/>
  <rect x="11" y="10" width="1" height="1" fill="#f9a8d4"/>
  <!-- smile -->
  <rect x="7" y="10" width="2" height="1" fill="#334155"/>
</svg>
