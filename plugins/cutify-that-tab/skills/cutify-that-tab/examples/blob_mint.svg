<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="28" height="28" rx="8" fill="url(#bg)"/>
  <!-- left eye open -->
  <circle cx="12" cy="14" r="2" fill="#fff"/>
  <!-- right eye wink (upside-down U arc) -->
  <path d="M18 14.5 Q20 12 22 14.5" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- smile -->
  <path d="M11 21 Q16 25 21 21" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round"/>
</svg>
