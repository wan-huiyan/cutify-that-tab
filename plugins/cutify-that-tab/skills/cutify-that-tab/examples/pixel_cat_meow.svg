<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- ears (orange-400) -->
  <rect x="3" y="3" width="2" height="2" fill="#fb923c"/>
  <rect x="11" y="3" width="2" height="2" fill="#fb923c"/>
  <!-- inner ear (orange-200) -->
  <rect x="3" y="4" width="2" height="1" fill="#fed7aa"/>
  <rect x="11" y="4" width="2" height="1" fill="#fed7aa"/>
  <!-- head (orange-300) -->
  <rect x="3" y="5" width="10" height="9" fill="#fdba74"/>
  <!-- closed happy eyes -->
  <rect x="5" y="8" width="1" height="1" fill="#1f2937"/>
  <rect x="4" y="9" width="3" height="1" fill="#1f2937"/>
  <rect x="10" y="8" width="1" height="1" fill="#1f2937"/>
  <rect x="9" y="9" width="3" height="1" fill="#1f2937"/>
  <!-- open meow mouth -->
  <rect x="7" y="10" width="2" height="2" fill="#9a3412"/>
  <rect x="7" y="10" width="2" height="1" fill="#fb7185"/>
  <!-- whisker dots -->
  <rect x="2" y="10" width="1" height="1" fill="#9a3412"/>
  <rect x="13" y="10" width="1" height="1" fill="#9a3412"/>
</svg>
