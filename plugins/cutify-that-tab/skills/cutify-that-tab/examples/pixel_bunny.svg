<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- ears outer (pink-300) -->
  <rect x="3" y="1" width="2" height="5" fill="#f9a8d4"/>
  <rect x="11" y="1" width="2" height="5" fill="#f9a8d4"/>
  <!-- ears inner (pink-500) -->
  <rect x="4" y="2" width="1" height="3" fill="#ec4899"/>
  <rect x="11" y="2" width="1" height="3" fill="#ec4899"/>
  <!-- head/body (peach: orange-300) -->
  <rect x="3" y="6" width="10" height="8" fill="#fdba74"/>
  <!-- eyes -->
  <rect x="5" y="9" width="1" height="2" fill="#1f2937"/>
  <rect x="10" y="9" width="1" height="2" fill="#1f2937"/>
  <!-- nose (pink-500) -->
  <rect x="7" y="11" width="2" height="1" fill="#ec4899"/>
  <!-- mouth corners -->
  <rect x="6" y="12" width="1" height="1" fill="#1f2937"/>
  <rect x="9" y="12" width="1" height="1" fill="#1f2937"/>
  <!-- blush -->
  <rect x="4" y="11" width="1" height="1" fill="#f9a8d4"/>
  <rect x="11" y="11" width="1" height="1" fill="#f9a8d4"/>
</svg>
