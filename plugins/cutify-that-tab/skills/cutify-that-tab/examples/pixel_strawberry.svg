<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- leaf top point (lime-600) -->
  <rect x="7" y="1" width="2" height="1" fill="#65a30d"/>
  <!-- leaf body -->
  <rect x="6" y="2" width="4" height="1" fill="#65a30d"/>
  <rect x="5" y="3" width="6" height="1" fill="#65a30d"/>
  <!-- body widest (red-500) -->
  <rect x="3" y="4" width="10" height="6" fill="#ef4444"/>
  <!-- body taper -->
  <rect x="4" y="10" width="8" height="2" fill="#ef4444"/>
  <rect x="5" y="12" width="6" height="1" fill="#ef4444"/>
  <rect x="6" y="13" width="4" height="1" fill="#ef4444"/>
  <!-- seeds (yellow-300) -->
  <rect x="5" y="5" width="1" height="1" fill="#fde047"/>
  <rect x="10" y="5" width="1" height="1" fill="#fde047"/>
  <rect x="4" y="8" width="1" height="1" fill="#fde047"/>
  <rect x="11" y="8" width="1" height="1" fill="#fde047"/>
  <rect x="6" y="11" width="1" height="1" fill="#fde047"/>
  <rect x="9" y="11" width="1" height="1" fill="#fde047"/>
  <!-- eyes -->
  <rect x="6" y="6" width="1" height="1" fill="#1f2937"/>
  <rect x="9" y="6" width="1" height="1" fill="#1f2937"/>
  <!-- smile -->
  <rect x="7" y="8" width="2" height="1" fill="#1f2937"/>
</svg>
