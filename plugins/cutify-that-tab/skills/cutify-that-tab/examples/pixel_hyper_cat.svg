<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- motion dashes (yellow-400) -->
  <rect x="0" y="6" width="2" height="1" fill="#facc15"/>
  <rect x="0" y="10" width="2" height="1" fill="#facc15"/>
  <rect x="14" y="6" width="2" height="1" fill="#facc15"/>
  <rect x="14" y="10" width="2" height="1" fill="#facc15"/>
  <!-- ears -->
  <rect x="3" y="3" width="2" height="2" fill="#1f2937"/>
  <rect x="11" y="3" width="2" height="2" fill="#1f2937"/>
  <!-- head (white cat) -->
  <rect x="3" y="5" width="10" height="9" fill="#f3f4f6"/>
  <!-- huge sparkly eyes -->
  <rect x="4" y="7" width="3" height="3" fill="#1f2937"/>
  <rect x="9" y="7" width="3" height="3" fill="#1f2937"/>
  <rect x="5" y="7" width="1" height="1" fill="#fff"/>
  <rect x="10" y="7" width="1" height="1" fill="#fff"/>
  <!-- open excited smile -->
  <rect x="7" y="11" width="2" height="1" fill="#1f2937"/>
  <rect x="6" y="12" width="4" height="1" fill="#1f2937"/>
</svg>
