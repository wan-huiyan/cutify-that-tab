<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- ears outer (brown-900) -->
  <rect x="2" y="5" width="2" height="3" fill="#78350f"/>
  <rect x="12" y="5" width="2" height="3" fill="#78350f"/>
  <!-- inner ear (amber-300) -->
  <rect x="2" y="6" width="2" height="1" fill="#fcd34d"/>
  <rect x="12" y="6" width="2" height="1" fill="#fcd34d"/>
  <!-- head outline (brown-900) -->
  <rect x="4" y="3" width="8" height="11" fill="#78350f"/>
  <rect x="3" y="4" width="1" height="9" fill="#78350f"/>
  <rect x="12" y="4" width="1" height="9" fill="#78350f"/>
  <!-- face (amber-300) -->
  <rect x="5" y="7" width="6" height="5" fill="#fcd34d"/>
  <rect x="6" y="6" width="4" height="1" fill="#fcd34d"/>
  <rect x="6" y="12" width="4" height="1" fill="#fcd34d"/>
  <!-- big pleading eyes -->
  <rect x="5" y="8" width="2" height="2" fill="#1f2937"/>
  <rect x="9" y="8" width="2" height="2" fill="#1f2937"/>
  <rect x="6" y="8" width="1" height="1" fill="#fff"/>
  <rect x="10" y="8" width="1" height="1" fill="#fff"/>
  <!-- small frown -->
  <rect x="7" y="11" width="2" height="1" fill="#7c2d12"/>
</svg>
