<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- top tuft (yellow-400) -->
  <rect x="7" y="2" width="2" height="1" fill="#facc15"/>
  <!-- body (yellow-300) -->
  <rect x="3" y="3" width="10" height="10" fill="#fde047"/>
  <!-- eyes -->
  <rect x="5" y="6" width="1" height="2" fill="#1f2937"/>
  <rect x="10" y="6" width="1" height="2" fill="#1f2937"/>
  <!-- beak (orange-500 / orange-600) -->
  <rect x="7" y="8" width="2" height="1" fill="#f97316"/>
  <rect x="7" y="9" width="2" height="1" fill="#ea580c"/>
  <!-- blush (orange-400) -->
  <rect x="4" y="9" width="1" height="1" fill="#fb923c"/>
  <rect x="11" y="9" width="1" height="1" fill="#fb923c"/>
  <!-- feet (orange-500) -->
  <rect x="5" y="13" width="2" height="1" fill="#f97316"/>
  <rect x="9" y="13" width="2" height="1" fill="#f97316"/>
</svg>
